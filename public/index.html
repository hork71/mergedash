<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Merge Request Dashboard</title>
<style>
  :root {
    --bg: #f6f7f9;
    --fg: #1c2430;
    --muted: #5b6572;
    --card: #ffffff;
    --border: #d9dee5;
    --accent: #1f6feb;
    --merged: #1a7f37;
    --opened: #9a6700;
    --closed: #cf222e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--fg);
  }
  header {
    padding: 1.25rem 2rem 0;
  }
  h1 { margin: 0 0 1rem; font-size: 1.3rem; }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: flex-end;
    padding: 0 2rem 1.25rem;
  }
  .field { display: flex; flex-direction: column; gap: .25rem; }
  .field label { font-size: .8rem; color: var(--muted); }
  input, select, button {
    font: inherit;
    padding: .45rem .6rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--card);
    color: var(--fg);
  }
  input:focus, select:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .combo { position: relative; }
  .combo input { min-width: 20rem; width: 100%; }
  .combo ul {
    position: absolute;
    top: calc(100% + 2px);
    left: 0;
    right: 0;
    margin: 0;
    padding: .25rem;
    list-style: none;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 4px 14px rgba(0,0,0,.12);
    max-height: 16rem;
    overflow-y: auto;
    z-index: 10;
  }
  .combo li {
    padding: .35rem .55rem;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .combo li:hover, .combo li.active { background: var(--accent); color: #fff; }
  .combo li.empty-hint { color: var(--muted); cursor: default; }
  .combo li.empty-hint:hover { background: none; color: var(--muted); }
  button {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    padding: .45rem 1.4rem;
    cursor: pointer;
  }
  button:hover { filter: brightness(1.1); }
  main { padding: 0 2rem 2rem; }
  #status { color: var(--muted); margin: .5rem 0 1rem; }
  h2.month {
    font-size: 1rem;
    margin: 1.5rem 0 .5rem;
    color: var(--muted);
    font-weight: 600;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  th, td {
    text-align: left;
    padding: .5rem .75rem;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  tr:last-child td { border-bottom: none; }
  th {
    font-size: .78rem;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: var(--muted);
    background: var(--bg);
  }
  td.num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  td.date { white-space: nowrap; font-variant-numeric: tabular-nums; }
  .state {
    display: inline-block;
    padding: .05rem .55rem;
    border-radius: 999px;
    font-size: .78rem;
    font-weight: 600;
    color: #fff;
    text-transform: capitalize;
  }
  .state-merged { background: var(--merged); }
  .state-opened { background: var(--opened); }
  .state-closed { background: var(--closed); }
  .state-other  { background: var(--muted); }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .empty { color: var(--muted); font-style: italic; }
</style>
</head>
<body>

<header><h1>Merge Request Dashboard</h1></header>

<div class="controls">
  <div class="field">
    <label for="project">Project</label>
    <div class="combo" id="project-combo">
      <input id="project" placeholder="Type to search projects…" autocomplete="off"
             role="combobox" aria-expanded="false" aria-controls="project-list">
      <ul id="project-list" role="listbox" hidden></ul>
    </div>
  </div>
  <div class="field">
    <label for="from">Start month</label>
    <select id="from"></select>
  </div>
  <div class="field">
    <label for="to">End month</label>
    <select id="to"></select>
  </div>
  <button id="go">Go</button>
</div>

<main>
  <div id="status"></div>
  <div id="results"></div>
</main>

<script>
(function () {
  const $ = (id) => document.getElementById(id);

  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  async function fetchJson(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error('Request failed: ' + res.status);
    return res.json();
  }

  async function init() {
    try {
      const [projects, months] = await Promise.all([
        fetchJson('/api/projects'),
        fetchJson('/api/months'),
      ]);

      setupProjectCombo(projects);

      const opts = months.map((m) => `<option value="${esc(m)}">${esc(m)}</option>`).join('');
      $('from').innerHTML = opts;
      $('to').innerHTML = opts;
      if (months.length) {
        $('from').value = months[0];
        $('to').value = months[months.length - 1];
      }
    } catch (err) {
      $('status').textContent = 'Could not load projects/months: ' + err.message;
    }
  }

  // Custom searchable dropdown. Unlike a native <datalist>, it always shows
  // the full list when opened, even if the input already holds a selection.
  function setupProjectCombo(projects) {
    const input = $('project');
    const list = $('project-list');
    let active = -1; // index of the keyboard-highlighted item

    function open(filter) {
      const term = (filter || '').toLowerCase();
      const matches = term
        ? projects.filter((p) => p.toLowerCase().includes(term))
        : projects;
      list.innerHTML = matches.length
        ? matches.map((p) => `<li role="option">${esc(p)}</li>`).join('')
        : '<li class="empty-hint">No matching projects</li>';
      active = -1;
      list.hidden = false;
      input.setAttribute('aria-expanded', 'true');
    }

    function close() {
      list.hidden = true;
      active = -1;
      input.setAttribute('aria-expanded', 'false');
    }

    function items() {
      return [...list.querySelectorAll('li:not(.empty-hint)')];
    }

    function highlight(idx) {
      const lis = items();
      if (!lis.length) return;
      active = (idx + lis.length) % lis.length;
      lis.forEach((li, i) => li.classList.toggle('active', i === active));
      lis[active].scrollIntoView({ block: 'nearest' });
    }

    function choose(li) {
      input.value = li.textContent;
      close();
    }

    // Show the complete list on focus/click so a previous selection
    // never hides the other choices.
    input.addEventListener('focus', () => open(''));
    input.addEventListener('click', () => { if (list.hidden) open(''); });
    input.addEventListener('input', () => open(input.value));

    input.addEventListener('keydown', (e) => {
      if (list.hidden && (e.key === 'ArrowDown' || e.key === 'ArrowUp')) {
        open('');
        e.preventDefault();
        return;
      }
      if (list.hidden) return;
      if (e.key === 'ArrowDown') { highlight(active + 1); e.preventDefault(); }
      else if (e.key === 'ArrowUp') { highlight(active - 1); e.preventDefault(); }
      else if (e.key === 'Enter') {
        const lis = items();
        if (active >= 0 && lis[active]) choose(lis[active]);
        else close();
        e.preventDefault();
        e.stopPropagation(); // don't trigger the global Enter -> go()
      }
      else if (e.key === 'Escape') { close(); }
      else if (e.key === 'Tab') { close(); }
    });

    list.addEventListener('mousedown', (e) => {
      // mousedown (not click) so it fires before the input loses focus
      const li = e.target.closest('li:not(.empty-hint)');
      if (li) { choose(li); e.preventDefault(); }
    });

    document.addEventListener('mousedown', (e) => {
      if (!$('project-combo').contains(e.target)) close();
    });
  }

  function stateBadge(state) {
    const cls = ['merged', 'opened', 'closed'].includes(state) ? state : 'other';
    return `<span class="state state-${cls}">${esc(state || 'unknown')}</span>`;
  }

  function renderMonth(month, rows) {
    const body = rows.map((r) => `
      <tr>
        <td class="num">${r.web_url
          ? `<a href="${esc(r.web_url)}" target="_blank" rel="noopener">!${esc(r.iid)}</a>`
          : `!${esc(r.iid)}`}</td>
        <td>${esc(r.title)}</td>
        <td>${stateBadge(r.state)}</td>
        <td>${esc(r.author)}</td>
        <td class="date">${esc(r.created_at)}</td>
        <td class="date">${esc(r.merged_at)}</td>
        <td>${esc(r.merged_by)}</td>
        <td>${esc(r.approved_by)}</td>
      </tr>`).join('');

    return `
      <h2 class="month">${esc(month)} (${rows.length} MR${rows.length === 1 ? '' : 's'})</h2>
      <table>
        <thead><tr>
          <th>MR</th><th>Title</th><th>State</th><th>Author</th>
          <th>Created</th><th>Merged</th><th>Merged by</th><th>Approved by</th>
        </tr></thead>
        <tbody>${body}</tbody>
      </table>`;
  }

  async function go() {
    const project = $('project').value.trim();
    const from = $('from').value;
    const to = $('to').value;
    const status = $('status');
    const results = $('results');

    if (!project) { status.textContent = 'Please select a project.'; return; }
    if (from > to) { status.textContent = 'Start month is after end month.'; return; }

    status.textContent = 'Loading…';
    results.innerHTML = '';
    try {
      const rows = await fetchJson('/api/merges?' + new URLSearchParams({ project, from, to }));
      if (!rows.length) {
        status.textContent = '';
        results.innerHTML = '<p class="empty">No merge requests found for this selection.</p>';
        return;
      }

      // Group rows by month (already sorted newest month first by the server).
      const byMonth = new Map();
      for (const r of rows) {
        if (!byMonth.has(r.month)) byMonth.set(r.month, []);
        byMonth.get(r.month).push(r);
      }

      status.textContent = `${rows.length} merge request${rows.length === 1 ? '' : 's'} in ${project}`;
      results.innerHTML = [...byMonth.entries()]
        .map(([month, list]) => renderMonth(month, list)).join('');
    } catch (err) {
      status.textContent = 'Error: ' + err.message;
    }
  }

  $('go').addEventListener('click', go);
  document.addEventListener('keydown', (e) => { if (e.key === 'Enter') go(); });

  init();
})();
</script>
</body>
</html>
